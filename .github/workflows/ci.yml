name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test:run

      - name: Build production bundle
        run: bun run build

      - name: Check deploy scripts syntax
        run: bash -n scripts/deploy/bootstrap-github-secrets.sh scripts/deploy/remote-bootstrap.sh

      - name: Check Docker Compose config
        run: docker compose config

      - name: Build production image
        run: docker build -t perfect-pitch-ci-local .

      - name: Validate default Caddy config
        run: |
          docker run --rm \
            -v "${PWD}/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.10-alpine \
            caddy validate --config /etc/caddy/Caddyfile

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
